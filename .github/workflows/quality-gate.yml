name: Quality Gate

on:
  push:
    branches:
      - develop
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moul_hanout
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/moul_hanout?schema=public
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Shared packages build
        run: npm run check:shared

      - name: Generate Prisma Client
        run: npm run generate:prisma

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: backend
        run: npx prisma db seed

      - name: Backend unit tests
        run: npm run test --workspace backend

      - name: Backend e2e tests
        run: npm run test:e2e --workspace backend

      - name: Backend build
        run: npm run build --workspace backend

      - name: Frontend lint and build
        run: npm run check:frontend
